<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 220" role="img" aria-labelledby="sigTitle">
  <title id="sigTitle">END.OF.TRANSMISSION — colophon</title>

  <defs>
    <pattern id="gridSig" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 L 0 40" fill="none" stroke="#00F0FF" stroke-width="0.5" opacity="0.1"/>
    </pattern>
    <filter id="glowSig" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .display { font-family: 'JetBrains Mono', 'Space Mono', 'SF Mono', ui-monospace, monospace; font-weight: 800; letter-spacing: -0.02em; }
      .mono { font-family: 'JetBrains Mono', 'SF Mono', ui-monospace, Menlo, monospace; font-weight: 500; letter-spacing: 0.06em; }
      .mono-bold { font-family: 'JetBrains Mono', 'SF Mono', ui-monospace, Menlo, monospace; font-weight: 700; letter-spacing: 0.12em; }
    </style>
  </defs>

  <rect width="1600" height="220" fill="#0B0D17"/>
  <rect width="1600" height="220" fill="url(#gridSig)"/>

  <!-- Corner brackets -->
  <g stroke="#00F0FF" stroke-width="1.5" fill="none" opacity="0.7">
    <path d="M 28 20 L 28 52 M 28 20 L 60 20"/>
    <path d="M 1572 20 L 1572 52 M 1572 20 L 1540 20"/>
    <path d="M 28 200 L 28 168 M 28 200 L 60 200"/>
    <path d="M 1572 200 L 1572 168 M 1572 200 L 1540 200"/>
  </g>

  <!-- Top strip -->
  <g transform="translate(100, 44)">
    <line x1="0" y1="0" x2="1400" y2="0" stroke="#1F2840" stroke-width="1"/>
    <line x1="0" y1="0" x2="180" y2="0" stroke="#B8FF00" stroke-width="2"/>
    <text y="-10" class="mono-bold" font-size="10" fill="#B8FF00">[ END.OF.TRANSMISSION ]</text>
    <circle cx="1380" cy="-14" r="3.5" fill="#FF006E" filter="url(#glowSig)">
      <animate attributeName="opacity" values="1;0.2;1" dur="1.8s" repeatCount="indefinite"/>
    </circle>
    <text x="1395" y="-10" class="mono-bold" font-size="10" fill="#FF006E">EOF</text>
  </g>

  <!-- EE monogram (left) -->
  <g transform="translate(100, 80)">
    <rect x="0" y="0" width="100" height="100" fill="none" stroke="#00F0FF" stroke-width="1.5"/>
    <rect x="4" y="4" width="92" height="92" fill="none" stroke="#FF006E" stroke-width="0.8" stroke-dasharray="2 3" opacity="0.7"/>
    <text x="50" y="74" class="display" font-size="68" fill="#E4E8F7" text-anchor="middle">EE</text>
    <text x="50" y="118" class="mono-bold" font-size="9" fill="#00F0FF" text-anchor="middle">0x001</text>
  </g>

  <!-- Center: ASCII metadata -->
  <g transform="translate(250, 108)">
    <text class="mono" font-size="11" fill="#4A5578"># colophon</text>
    <text y="20" class="mono" font-size="13" fill="#E4E8F7">handwritten in svg + markdown. no template.</text>
    <text y="40" class="mono" font-size="13" fill="#E4E8F7">set in <tspan fill="#00F0FF">jetbrains mono</tspan> with a lot of espresso.</text>
    <text y="68" class="mono" font-size="10" fill="#4A5578">LAT 41.0082°N ⟡ LON 28.9784°E ⟡ GMT+3 ⟡ ISTANBUL.TR</text>
  </g>

  <!-- Right: signoff -->
  <g transform="translate(1280, 108)">
    <text class="mono-bold" font-size="10" fill="#B8FF00">▸ EMRE ERIM</text>
    <text y="20" class="mono" font-size="11" fill="#E4E8F7">designer · coder · maker</text>
    <text y="40" class="mono" font-size="11" fill="#E4E8F7">erim.dev</text>
    <text y="68" class="mono" font-size="10" fill="#4A5578">© 2026 ⟡ PAGE 1/1</text>
  </g>

  <!-- Bottom strip -->
  <g transform="translate(100, 196)">
    <line x1="0" y1="0" x2="1400" y2="0" stroke="#1F2840" stroke-width="1"/>
  </g>
</svg>
