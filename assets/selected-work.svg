<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 320" role="img" aria-labelledby="t d">
  <title id="t">Selected Work</title>
  <desc id="d">Three project cards leading to eerim.dev</desc>

  <defs>
    <pattern id="hf2" width="9" height="9" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="0.9" fill="#FF3B30" opacity="0.32"/>
    </pattern>
    <pattern id="hfC" width="9" height="9" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="0.9" fill="#2EC4F1" opacity="0.32"/>
    </pattern>
    <style>
      .display { font-family: 'Anton','Bebas Neue','Arial Narrow',Impact,sans-serif; font-weight:900; letter-spacing:0.02em; }
      .mono    { font-family: 'JetBrains Mono','IBM Plex Mono','SF Mono',Menlo,monospace; }
      .heavy   { font-family: -apple-system,'Helvetica Neue','Arial Black',sans-serif; font-weight:900; }
      .body    { font-family: -apple-system,'Helvetica Neue',sans-serif; font-weight:600; }
    </style>
  </defs>

  <rect width="1100" height="320" fill="#0D0D0D"/>

  <!-- title -->
  <text x="40" y="44" class="display" font-size="32" fill="#F5EDE0" letter-spacing="0.18em">SELECTED WORK</text>
  <text x="40" y="66" class="mono" font-size="11" fill="#2EC4F1" letter-spacing="0.22em">EDITION 04 · ROLLING INDEX</text>

  <!-- Card 01 -->
  <g transform="translate(40 100)">
    <rect x="6" y="6" width="220" height="180" fill="#FF3B30"/>
    <rect x="0" y="0" width="220" height="180" fill="#F5EDE0" stroke="#0D0D0D" stroke-width="3"/>
    <!-- top stripe -->
    <rect x="0" y="0" width="220" height="28" fill="#0D0D0D"/>
    <text x="10" y="20" class="mono" font-size="11" fill="#F5EDE0" letter-spacing="0.22em">№ 01 · WEB</text>
    <!-- visual block: small UI mock -->
    <g transform="translate(20 44)">
      <rect x="0" y="0" width="180" height="58" fill="#2EC4F1" stroke="#0D0D0D" stroke-width="2.5"/>
      <rect x="0" y="0" width="180" height="58" fill="url(#hf2)"/>
      <circle cx="14" cy="14" r="4" fill="#FF3B30" stroke="#0D0D0D" stroke-width="1.5"/>
      <circle cx="26" cy="14" r="4" fill="#0D0D0D"/>
      <rect x="10" y="28" width="100" height="6" fill="#0D0D0D"/>
      <rect x="10" y="40" width="60" height="6" fill="#0D0D0D"/>
    </g>
    <text x="20" y="128" class="display" font-size="22" fill="#0D0D0D">EERIM.DEV v3</text>
    <text x="20" y="148" class="body" font-size="11" fill="#0D0D0D">portfolio + toy storefront</text>
    <text x="20" y="170" class="mono" font-size="10" fill="#FF3B30" letter-spacing="0.16em">▸ next.js · ts · figma</text>
  </g>

  <!-- Card 02 -->
  <g transform="translate(290 100)">
    <rect x="6" y="6" width="220" height="180" fill="#2EC4F1"/>
    <rect x="0" y="0" width="220" height="180" fill="#F5EDE0" stroke="#0D0D0D" stroke-width="3"/>
    <rect x="0" y="0" width="220" height="28" fill="#0D0D0D"/>
    <text x="10" y="20" class="mono" font-size="11" fill="#F5EDE0" letter-spacing="0.22em">№ 02 · OBJECT</text>
    <!-- visual: vinyl figure silhouette -->
    <g transform="translate(60 44)">
      <rect x="20" y="20" width="60" height="50" rx="8" fill="#FF3B30" stroke="#0D0D0D" stroke-width="2.5"/>
      <rect x="20" y="20" width="60" height="50" rx="8" fill="url(#hf2)"/>
      <circle cx="50" cy="14" r="22" fill="#F5EDE0" stroke="#0D0D0D" stroke-width="2.5"/>
      <circle cx="42" cy="12" r="3" fill="#0D0D0D"/>
      <circle cx="58" cy="12" r="3" fill="#0D0D0D"/>
    </g>
    <text x="20" y="138" class="display" font-size="22" fill="#0D0D0D">VINYL № 04</text>
    <text x="20" y="158" class="body" font-size="11" fill="#0D0D0D">toy series · designer figures</text>
    <text x="20" y="178" class="mono" font-size="10" fill="#2EC4F1" letter-spacing="0.16em">▸ blender · resin · riso</text>
  </g>

  <!-- Card 03 -->
  <g transform="translate(540 100)">
    <rect x="6" y="6" width="220" height="180" fill="#0D0D0D"/>
    <rect x="0" y="0" width="220" height="180" fill="#F5EDE0" stroke="#0D0D0D" stroke-width="3"/>
    <rect x="0" y="0" width="220" height="28" fill="#0D0D0D"/>
    <text x="10" y="20" class="mono" font-size="11" fill="#F5EDE0" letter-spacing="0.22em">№ 03 · PRINT</text>
    <!-- visual: zine pages -->
    <g transform="translate(30 44)">
      <rect x="6" y="6" width="68" height="58" fill="#FF3B30" stroke="#0D0D0D" stroke-width="2.5"/>
      <rect x="36" y="0" width="68" height="58" fill="#2EC4F1" stroke="#0D0D0D" stroke-width="2.5"/>
      <rect x="36" y="0" width="68" height="58" fill="url(#hfC)"/>
      <rect x="86" y="14" width="68" height="58" fill="#F5EDE0" stroke="#0D0D0D" stroke-width="2.5"/>
      <line x1="92" y1="28" x2="148" y2="28" stroke="#0D0D0D" stroke-width="2"/>
      <line x1="92" y1="38" x2="138" y2="38" stroke="#0D0D0D" stroke-width="2"/>
      <line x1="92" y1="48" x2="148" y2="48" stroke="#0D0D0D" stroke-width="2"/>
    </g>
    <text x="20" y="138" class="display" font-size="22" fill="#0D0D0D">UI ZINE</text>
    <text x="20" y="158" class="body" font-size="11" fill="#0D0D0D">a riso book on patterns</text>
    <text x="20" y="178" class="mono" font-size="10" fill="#0D0D0D" letter-spacing="0.16em">▸ writing · print · craft</text>
  </g>

  <!-- big CTA arrow on right -->
  <g transform="translate(820 100)">
    <rect x="6" y="6" width="240" height="180" fill="#FF3B30"/>
    <rect x="0" y="0" width="240" height="180" fill="#0D0D0D" stroke="#0D0D0D" stroke-width="3"/>
    <rect x="0" y="0" width="240" height="180" fill="url(#hfC)"/>
    <text x="20" y="60" class="mono" font-size="11" fill="#2EC4F1" letter-spacing="0.22em">SEE EVERYTHING</text>
    <text x="20" y="108" class="display" font-size="38" fill="#F5EDE0">EERIM</text>
    <text x="20" y="148" class="display" font-size="38" fill="#FF3B30">.DEV →</text>
    <text x="20" y="170" class="mono" font-size="10" fill="#F5EDE0" opacity="0.6" letter-spacing="0.18em">FULL ARCHIVE · STORE · NOTES</text>
  </g>

  <!-- footer mark -->
  <text x="40" y="304" class="mono" font-size="10" fill="#F5EDE0" opacity="0.4" letter-spacing="0.3em">PRESS RUN 04 · ISTANBUL · EERIM STUDIO ◆ ◆ ◆</text>
</svg>
