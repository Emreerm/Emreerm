<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 76" role="img" aria-label="behance">
  <defs>
    <pattern id="bbHF" width="9" height="9" patternUnits="userSpaceOnUse"><circle cx="2" cy="2" r="0.9" fill="#0D0D0D" opacity="0.18"/></pattern>
    <style>
      .display { font-family: 'Anton','Bebas Neue','Arial Narrow',Impact,sans-serif; font-weight:900; letter-spacing:0.04em; }
      .mono    { font-family: 'JetBrains Mono','IBM Plex Mono','SF Mono',Menlo,monospace; }
    </style>
  </defs>
  <rect width="220" height="76" fill="#0D0D0D"/>
  <rect x="14" y="14" width="196" height="50" fill="#FF3B30"/>
  <rect x="8" y="8" width="196" height="50" fill="#2EC4F1" stroke="#0D0D0D" stroke-width="3"/>
  <rect x="8" y="8" width="196" height="50" fill="url(#bbHF)"/>
  <!-- icon: stacked Be blocks -->
  <g transform="translate(20 22)">
    <rect x="0" y="0" width="14" height="13" fill="#F5EDE0" stroke="#0D0D0D" stroke-width="2"/>
    <rect x="0" y="13" width="16" height="13" fill="#0D0D0D" stroke="#0D0D0D" stroke-width="2"/>
    <rect x="20" y="6" width="16" height="14" fill="#FF3B30" stroke="#0D0D0D" stroke-width="2"/>
    <rect x="20" y="22" width="16" height="6" fill="#0D0D0D"/>
  </g>
  <text x="64" y="32" class="mono" font-size="9" fill="#0D0D0D" letter-spacing="0.22em">PORTFOLIO →</text>
  <text x="64" y="50" class="display" font-size="20" fill="#0D0D0D">BEHANCE</text>
</svg>
