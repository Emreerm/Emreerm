<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 280" role="img" aria-labelledby="t d">
  <title id="t">Tools of the Trade</title>
  <desc id="d">Figma, React with TypeScript, Blender, After Effects</desc>

  <defs>
    <pattern id="hfRed" width="10" height="10" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#FF3B30" opacity="0.35"/>
    </pattern>
    <pattern id="hfCyan" width="10" height="10" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#2EC4F1" opacity="0.45"/>
    </pattern>
    <pattern id="hfDark" width="10" height="10" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#0D0D0D" opacity="0.32"/>
    </pattern>
    <style>
      .display { font-family: 'Anton','Bebas Neue','Arial Narrow',Impact,sans-serif; font-weight:900; letter-spacing:0.02em; }
      .mono    { font-family: 'JetBrains Mono','IBM Plex Mono','SF Mono',Menlo,monospace; }
    </style>
  </defs>

  <rect width="900" height="280" fill="#0D0D0D"/>

  <!-- section title -->
  <g transform="translate(40 36)">
    <rect x="-2" y="-22" width="280" height="32" fill="#FF3B30"/>
    <text x="10" y="2" class="display" font-size="22" fill="#0D0D0D" letter-spacing="0.18em">TOOLS OF THE TRADE</text>
  </g>
  <text x="860" y="36" text-anchor="end" class="mono" font-size="11" fill="#F5EDE0" opacity="0.5" letter-spacing="0.22em">CATALOG · 003</text>

  <!-- =============================== -->
  <!-- Sticker 1: FIGMA (cyan, rotated -5) -->
  <g transform="translate(110 170) rotate(-5)">
    <rect x="-86" y="-58" width="172" height="116" fill="#0D0D0D"/>
    <rect x="-92" y="-64" width="172" height="116" fill="#2EC4F1" stroke="#0D0D0D" stroke-width="3"/>
    <rect x="-92" y="-64" width="172" height="116" fill="url(#hfDark)"/>
    <!-- icon: stylized F -->
    <g transform="translate(-66 -34)">
      <rect x="0"  y="0"  width="22" height="20" fill="#FF3B30" stroke="#0D0D0D" stroke-width="2"/>
      <rect x="0"  y="20" width="22" height="20" fill="#F5EDE0" stroke="#0D0D0D" stroke-width="2"/>
      <rect x="0"  y="40" width="22" height="20" fill="#0D0D0D" stroke="#0D0D0D" stroke-width="2"/>
      <rect x="22" y="0"  width="22" height="20" fill="#F5EDE0" stroke="#0D0D0D" stroke-width="2"/>
      <circle cx="33" cy="30" r="11" fill="#FF3B30" stroke="#0D0D0D" stroke-width="2"/>
    </g>
    <text x="-8" y="6" class="display" font-size="38" fill="#0D0D0D">FIGMA</text>
    <text x="-8" y="32" class="mono" font-size="9" fill="#0D0D0D" letter-spacing="0.18em">UI / UX / DESIGN</text>
  </g>

  <!-- Sticker 2: REACT + TS (red, rotated +3) -->
  <g transform="translate(310 160) rotate(3)">
    <rect x="-86" y="-58" width="186" height="116" fill="#0D0D0D"/>
    <rect x="-92" y="-64" width="186" height="116" fill="#FF3B30" stroke="#0D0D0D" stroke-width="3"/>
    <rect x="-92" y="-64" width="186" height="116" fill="url(#hfDark)"/>
    <!-- icon: atom + TS -->
    <g transform="translate(-70 -34)">
      <ellipse cx="22" cy="22" rx="22" ry="9" fill="none" stroke="#0D0D0D" stroke-width="2.5"/>
      <ellipse cx="22" cy="22" rx="22" ry="9" fill="none" stroke="#0D0D0D" stroke-width="2.5" transform="rotate(60 22 22)"/>
      <ellipse cx="22" cy="22" rx="22" ry="9" fill="none" stroke="#0D0D0D" stroke-width="2.5" transform="rotate(-60 22 22)"/>
      <circle cx="22" cy="22" r="4" fill="#0D0D0D"/>
      <rect x="46" y="34" width="22" height="22" fill="#0D0D0D"/>
      <text x="57" y="51" text-anchor="middle" class="display" font-size="14" fill="#F5EDE0">TS</text>
    </g>
    <text x="-12" y="8" class="display" font-size="34" fill="#F5EDE0">REACT+TS</text>
    <text x="-12" y="34" class="mono" font-size="9" fill="#F5EDE0" letter-spacing="0.18em">FRONTEND / TYPED</text>
  </g>

  <!-- Sticker 3: BLENDER (cream, rotated -2) -->
  <g transform="translate(530 178) rotate(-2)">
    <rect x="-86" y="-58" width="172" height="116" fill="#0D0D0D"/>
    <rect x="-92" y="-64" width="172" height="116" fill="#F5EDE0" stroke="#0D0D0D" stroke-width="3"/>
    <rect x="-92" y="-64" width="172" height="116" fill="url(#hfRed)"/>
    <!-- icon: 3D cube wireframe -->
    <g transform="translate(-66 -38)" stroke="#0D0D0D" stroke-width="2.5" fill="none">
      <polygon points="22,2 44,14 44,38 22,50 0,38 0,14" fill="#FF3B30"/>
      <line x1="22" y1="2" x2="22" y2="26"/>
      <line x1="22" y1="26" x2="0" y2="14"/>
      <line x1="22" y1="26" x2="44" y2="14"/>
      <line x1="22" y1="26" x2="22" y2="50"/>
    </g>
    <text x="-12" y="4" class="display" font-size="36" fill="#0D0D0D">BLENDER</text>
    <text x="-12" y="30" class="mono" font-size="9" fill="#0D0D0D" letter-spacing="0.18em">3D / TOY MOCKUP</text>
  </g>

  <!-- Sticker 4: AFTER FX (black, rotated +4) -->
  <g transform="translate(740 168) rotate(4)">
    <rect x="-86" y="-58" width="172" height="116" fill="#FF3B30"/>
    <rect x="-92" y="-64" width="172" height="116" fill="#0D0D0D" stroke="#0D0D0D" stroke-width="3"/>
    <rect x="-92" y="-64" width="172" height="116" fill="url(#hfCyan)"/>
    <!-- icon: triangle play with squiggle -->
    <g transform="translate(-66 -36)">
      <polygon points="0,0 0,40 36,20" fill="#2EC4F1" stroke="#0D0D0D" stroke-width="2.5"/>
      <path d="M44 6 Q56 20 44 34" fill="none" stroke="#2EC4F1" stroke-width="3" stroke-linecap="round"/>
      <path d="M52 0 Q66 20 52 40" fill="none" stroke="#2EC4F1" stroke-width="3" stroke-linecap="round"/>
    </g>
    <text x="-12" y="6" class="display" font-size="34" fill="#F5EDE0">AFTER FX</text>
    <text x="-12" y="32" class="mono" font-size="9" fill="#2EC4F1" letter-spacing="0.18em">MOTION / FRAMES</text>
  </g>

  <!-- footer caption -->
  <text x="450" y="265" text-anchor="middle" class="mono" font-size="10" fill="#F5EDE0" opacity="0.4" letter-spacing="0.3em">+ FIGMA · REACT · TS · BLENDER · AE · A LITTLE COFFEE +</text>
</svg>
