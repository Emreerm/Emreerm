<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 76" role="img" aria-label="mail">
  <defs>
    <pattern id="bmHF" width="9" height="9" patternUnits="userSpaceOnUse"><circle cx="2" cy="2" r="0.9" fill="#0D0D0D" opacity="0.18"/></pattern>
    <style>
      .display { font-family: 'Anton','Bebas Neue','Arial Narrow',Impact,sans-serif; font-weight:900; letter-spacing:0.04em; }
      .mono    { font-family: 'JetBrains Mono','IBM Plex Mono','SF Mono',Menlo,monospace; }
    </style>
  </defs>
  <rect width="220" height="76" fill="#0D0D0D"/>
  <rect x="14" y="14" width="196" height="50" fill="#FF3B30"/>
  <rect x="8" y="8" width="196" height="50" fill="#F5EDE0" stroke="#0D0D0D" stroke-width="3"/>
  <rect x="8" y="8" width="196" height="50" fill="url(#bmHF)"/>
  <!-- icon: envelope -->
  <g transform="translate(20 22)">
    <rect x="0" y="0" width="34" height="22" fill="#2EC4F1" stroke="#0D0D0D" stroke-width="2.5"/>
    <polyline points="0,0 17,14 34,0" fill="none" stroke="#0D0D0D" stroke-width="2.5"/>
    <circle cx="29" cy="-1" r="4.5" fill="#FF3B30" stroke="#0D0D0D" stroke-width="2"/>
  </g>
  <text x="62" y="32" class="mono" font-size="9" fill="#0D0D0D" letter-spacing="0.22em">SAY HI →</text>
  <text x="62" y="50" class="display" font-size="18" fill="#0D0D0D">EMRE.UIUX</text>
</svg>
