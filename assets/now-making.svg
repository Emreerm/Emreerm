<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 240" role="img" aria-labelledby="t d">
  <title id="t">Now Making</title>
  <desc id="d">Risograph sticker listing current projects</desc>

  <defs>
    <pattern id="hf" x="0" y="0" width="12" height="12" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.0" fill="#FF3B30" opacity="0.32"/>
    </pattern>
    <style>
      .display { font-family: 'Anton','Bebas Neue','Arial Narrow',Impact,sans-serif; font-weight:900; letter-spacing:0.02em; }
      .mono    { font-family: 'JetBrains Mono','IBM Plex Mono','SF Mono',Menlo,monospace; }
      .heavy   { font-family: -apple-system,'Helvetica Neue','Arial Black',sans-serif; font-weight:900; }
    </style>
  </defs>

  <rect width="900" height="240" fill="#0D0D0D"/>

  <!-- tilted sticker -->
  <g transform="translate(36 30) rotate(-1.6)">
    <!-- shadow -->
    <rect x="6" y="6" width="828" height="180" fill="#FF3B30"/>
    <!-- card -->
    <rect x="0" y="0" width="828" height="180" fill="#F5EDE0" stroke="#0D0D0D" stroke-width="3"/>
    <!-- top label bar -->
    <rect x="0" y="0" width="828" height="32" fill="#0D0D0D"/>
    <text x="14" y="22" class="mono" font-size="11" fill="#F5EDE0" letter-spacing="0.22em">FOLDER · 002 / NOW</text>
    <text x="814" y="22" class="mono" font-size="11" fill="#2EC4F1" letter-spacing="0.22em" text-anchor="end">LAST UPDATED · 2026.05</text>

    <!-- big star + heading -->
    <g transform="translate(28 76)">
      <path d="M0,-22 L6,-6 L22,-6 L9,4 L14,20 L0,11 L-14,20 L-9,4 L-22,-6 L-6,-6 Z" fill="#FF3B30" stroke="#0D0D0D" stroke-width="2"/>
    </g>
    <text x="64" y="84" class="display" font-size="48" fill="#0D0D0D">NOW MAKING</text>

    <!-- bullets -->
    <g class="heavy" font-size="15" fill="#0D0D0D">
      <text x="64" y="120">▸ <tspan fill="#FF3B30">vinyl toy storefront</tspan> — eerim.dev v3</text>
      <text x="64" y="142">▸ <tspan fill="#2EC4F1">a riso zine</tspan> about ui patterns</text>
      <text x="64" y="164">▸ shipping side projects on weekends</text>
    </g>

    <!-- corner halftone -->
    <rect x="688" y="44" width="120" height="120" fill="url(#hf)" opacity="0.7"/>
    <!-- date stamp -->
    <g transform="translate(740 100) rotate(-8)">
      <rect x="-50" y="-18" width="100" height="36" fill="#2EC4F1" stroke="#0D0D0D" stroke-width="2"/>
      <text x="0" y="-2" text-anchor="middle" class="mono" font-size="9" fill="#0D0D0D" letter-spacing="0.15em">PRESS RUN</text>
      <text x="0" y="13" text-anchor="middle" class="display" font-size="16" fill="#0D0D0D">№ 04</text>
    </g>
  </g>

  <!-- punch holes -->
  <circle cx="60" cy="20" r="5" fill="#0D0D0D"/>
  <circle cx="840" cy="20" r="5" fill="#0D0D0D"/>
</svg>
