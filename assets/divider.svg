<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 44" role="presentation" aria-hidden="true">
  <defs>
    <pattern id="dot" x="0" y="0" width="6" height="6" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.7" fill="#0D0D0D" opacity="0.18"/>
    </pattern>
    <style>
      .display { font-family: 'Anton','Bebas Neue','Arial Narrow',Impact,sans-serif; font-weight:900; letter-spacing:0.06em; }
    </style>
  </defs>
  <rect width="1200" height="44" fill="#F5EDE0"/>
  <rect width="1200" height="44" fill="url(#dot)"/>
  <line x1="0" y1="2"   x2="1200" y2="2"   stroke="#0D0D0D" stroke-width="2"/>
  <line x1="0" y1="42"  x2="1200" y2="42"  stroke="#0D0D0D" stroke-width="2"/>

  <!-- repeating glyph marquee -->
  <g font-size="22" dominant-baseline="middle">
    <!-- group A: position 0..1200 every 80px, alternate colors and shapes -->
    <text x="20"   y="24" fill="#FF3B30" class="display">★</text>
    <text x="60"   y="24" fill="#0D0D0D" class="display">◆</text>
    <text x="100"  y="24" fill="#2EC4F1" class="display">●</text>
    <text x="140"  y="24" fill="#0D0D0D" class="display">▲</text>
    <text x="180"  y="24" fill="#FF3B30" class="display">★</text>
    <text x="220"  y="24" fill="#0D0D0D" class="display">◆</text>
    <text x="260"  y="24" fill="#2EC4F1" class="display">●</text>
    <text x="300"  y="24" fill="#0D0D0D" class="display">▲</text>
    <text x="340"  y="24" fill="#FF3B30" class="display">★</text>
    <text x="380"  y="24" fill="#0D0D0D" class="display">◆</text>
    <text x="420"  y="24" fill="#2EC4F1" class="display">●</text>
    <text x="460"  y="24" fill="#0D0D0D" class="display">▲</text>
    <text x="500"  y="24" fill="#FF3B30" class="display">★</text>
    <text x="540"  y="24" fill="#0D0D0D" class="display">◆</text>
    <text x="580"  y="24" fill="#2EC4F1" class="display">●</text>
    <text x="620"  y="24" fill="#0D0D0D" class="display">▲</text>
    <text x="660"  y="24" fill="#FF3B30" class="display">★</text>
    <text x="700"  y="24" fill="#0D0D0D" class="display">◆</text>
    <text x="740"  y="24" fill="#2EC4F1" class="display">●</text>
    <text x="780"  y="24" fill="#0D0D0D" class="display">▲</text>
    <text x="820"  y="24" fill="#FF3B30" class="display">★</text>
    <text x="860"  y="24" fill="#0D0D0D" class="display">◆</text>
    <text x="900"  y="24" fill="#2EC4F1" class="display">●</text>
    <text x="940"  y="24" fill="#0D0D0D" class="display">▲</text>
    <text x="980"  y="24" fill="#FF3B30" class="display">★</text>
    <text x="1020" y="24" fill="#0D0D0D" class="display">◆</text>
    <text x="1060" y="24" fill="#2EC4F1" class="display">●</text>
    <text x="1100" y="24" fill="#0D0D0D" class="display">▲</text>
    <text x="1140" y="24" fill="#FF3B30" class="display">★</text>
    <text x="1180" y="24" fill="#0D0D0D" class="display">◆</text>
  </g>
</svg>
