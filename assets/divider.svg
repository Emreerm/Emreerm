<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 24" role="img" aria-label="glitch divider">
  <defs>
    <style>
      .mono { font-family: 'JetBrains Mono', 'SF Mono', ui-monospace, Menlo, monospace; font-weight: 700; letter-spacing: 0.2em; }
    </style>
  </defs>

  <rect width="1600" height="24" fill="#0B0D17"/>
  <line x1="0" y1="12" x2="1600" y2="12" stroke="#1F2840" stroke-width="1" stroke-dasharray="2 4"/>

  <!-- Left tick -->
  <rect x="0" y="6" width="4" height="12" fill="#00F0FF"/>
  <!-- Right tick -->
  <rect x="1596" y="6" width="4" height="12" fill="#FF006E"/>

  <!-- Center glitch cluster -->
  <g transform="translate(800, 12)" text-anchor="middle">
    <rect x="-80" y="-1" width="160" height="2" fill="#00F0FF" opacity="0.3"/>
    <rect x="-10" y="-4" width="20" height="8" fill="#0B0D17"/>
    <text y="4" class="mono" font-size="10" fill="#FF006E">◆</text>
  </g>
</svg>
