<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 40" role="img" aria-label="Section divider">
  <defs>
    <style>
      .mono { font-family: 'JetBrains Mono', ui-monospace, Menlo, monospace; letter-spacing: 0.3em; }
    </style>
  </defs>

  <!-- Horizontal line with crimson tick marks -->
  <line x1="0" y1="20" x2="1400" y2="20" stroke="#6B6B6B" stroke-width="1" stroke-dasharray="2 4"/>

  <!-- Decorative tick marks -->
  <g fill="#FF2C2C">
    <rect x="0" y="14" width="4" height="12"/>
    <rect x="1396" y="14" width="4" height="12"/>
  </g>

  <!-- Center ornament -->
  <g transform="translate(700, 20)">
    <line x1="-100" y1="0" x2="-20" y2="0" stroke="#FF2C2C" stroke-width="1"/>
    <line x1="20" y1="0" x2="100" y2="0" stroke="#FF2C2C" stroke-width="1"/>
    <circle cx="0" cy="0" r="3" fill="#FF2C2C"/>
    <circle cx="-12" cy="0" r="1.5" fill="#FF2C2C"/>
    <circle cx="12" cy="0" r="1.5" fill="#FF2C2C"/>
  </g>
</svg>
